name = "esporteid-next"
compatibility_date = "2026-05-05"
# Template @opennextjs/cloudflare: nodejs + fetch público (evita surpresas com URLs absolutas no worker).
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]
pages_build_output_dir = ".open-next"

# Em Workers puro, OpenNext usa `[assets]` com binding `ASSETS`. Em **Pages**, `ASSETS` é nome reservado pelo runtime;
# os estáticos vêm do próprio output em `.open-next` — não declare `[assets]` aqui.
#
# Não use `[[services]]` WORKER_SELF_REFERENCE aqui: no Cloudflare **Pages** o publish falha com
# "references Worker … which was not found". Esse binding existe no template de **Workers** (`opennextjs-cloudflare deploy`).
