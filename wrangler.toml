# Deploy em **Cloudflare Workers** (formato oficial OpenNext).
# O adaptador não é suportado em Cloudflare **Pages** com só `pages_build_output_dir` — isso gerava
# runtime: `Cannot read ... 'require'` / `'react-rsc'` (ver `wrangler pages deployment tail`).
#
# Próximos passos:
# 1. Desligue o deploy automático do projeto **Pages** ligado a este repo (ou use outro repositório só para Pages).
# 2. Crie / use **Workers** + domínio (workers.dev ou custom) e faça deploy com:
#    npm run deploy:cf
#    (exige `wrangler login` local ou `CLOUDFLARE_API_TOKEN` + `CLOUDFLARE_ACCOUNT_ID` no CI).
# 3. Opcional: [Workers Builds](https://developers.cloudflare.com/workers/ci-cd/builds/) ligado ao GitHub com o mesmo comando.

name = "esporteid-next"
main = ".open-next/worker.js"
compatibility_date = "2026-05-05"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

[assets]
binding = "ASSETS"
directory = ".open-next/assets"

[[services]]
binding = "WORKER_SELF_REFERENCE"
service = "esporteid-next"

# Públicas no cliente — necessárias no build e no worker.
[vars]
NEXT_PUBLIC_SUPABASE_URL = "https://mszefppevculardthqrt.supabase.co"
