<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0b1d2e" />
    <title>EsporteID</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0b1d2e;
        color: #f8fafc;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
      }

      main {
        display: grid;
        gap: 12px;
        max-width: 320px;
        padding: 24px;
        text-align: center;
      }

      img {
        width: 96px;
        height: 96px;
        margin: 0 auto 8px;
        border-radius: 22px;
      }

      p {
        margin: 0;
        color: #cbd5e1;
      }

      a {
        color: #f97316;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/pwa-icon-192.png" alt="EsporteID" />
      <h1>EsporteID</h1>
      <p>Abra o app com conexao ativa para carregar a experiencia completa.</p>
      <a href="https://esporteid.com.br">Abrir esporteid.com.br</a>
    </main>
  </body>
</html>
