<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width" />
  <title>E-mail alterado</title>
</head>
<body style="margin:0;padding:0;background-color:#0b1d2e;">
<!--
  SUPABASE → "Email address changed" notification
  Assunto sugerido: O e-mail da sua conta EsporteID foi alterado
  Variáveis: {{ .Email }}, {{ .OldEmail }} (conforme doc Supabase)
-->
<table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="background-color:#0b1d2e;margin:0;padding:24px 12px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;">
  <tr>
    <td align="center">
      <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="600" style="max-width:600px;width:100%;background-color:#f1f5f9;border-radius:16px;overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,0.35);">
        <tr>
          <td style="background:linear-gradient(135deg,#0b1d2e 0%,#172554 50%,#0b1d2e 100%);padding:28px 24px;text-align:center;">
            <img src="https://www.esporteid.com.br/brand/logo-wordmark.png" width="220" height="auto" alt="EsporteID" style="display:block;margin:0 auto;max-width:220px;height:auto;border:0;" />
          </td>
        </tr>
        <tr>
          <td style="padding:32px 28px 8px;color:#0f172a;font-size:16px;line-height:1.6;">
            <h1 style="margin:0 0 12px;font-size:22px;font-weight:800;color:#0f172a;">E-mail da conta atualizado</h1>
            <p style="margin:0 0 12px;">O endereço de e-mail da sua conta EsporteID foi alterado.</p>
            <p style="margin:0 0 8px;font-size:14px;color:#475569;">Anterior: <strong>{{ .OldEmail }}</strong></p>
            <p style="margin:0 0 16px;font-size:14px;color:#475569;">Atual: <strong>{{ .Email }}</strong></p>
            <p style="margin:0;font-size:14px;color:#475569;">Se você não reconhece essa alteração, fale com <a href="mailto:contato@esporteid.com.br" style="color:#2563eb;font-weight:600;">contato@esporteid.com.br</a> imediatamente.</p>
          </td>
        </tr>
        <tr>
          <td style="padding:0 28px 28px;color:#64748b;font-size:12px;line-height:1.5;border-top:1px solid #e2e8f0;">
            <p style="margin:20px 0 0;">EsporteID</p>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
</body>
</html>
